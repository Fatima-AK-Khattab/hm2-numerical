<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة تكريت - واجب التحليلات العددية</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .equation-img { max-height: 90px; margin: 20px auto; display: block; filter: contrast(1.2); }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ضعي رابط Google Script الخاص بكِ هنا ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxY0kSG1xnflmTKFY25YNYDn3OxfwfVEIRam0uTgOdLMENLhNx4rea6JG1bByRgLmvB/exec";

        function App() {
            const [step, setStep] = useState('register');
            const [studentInfo, setStudentInfo] = useState({ name: '', studyType: 'صباحي A' });
            const [studentAns, setStudentAns] = useState({});
            const [targetX, setTargetX] = useState(1.5);
            const [pdfBase64, setPdfBase64] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            // بيانات الأسئلة الأصلية
            const hwData = {
                q1: { 
                    text: "Q1: Given the following data, Approximate the functional value at (x=" + targetX + ") using Newton forward, Newton backward, and Lagrange interpolating.", 
                    x: [1, 2, 3, 4, 5], 
                    y: [2, 5, 10, 17, 26] 
                },
                q2: { 
                    text: "Q2: Determine the constants; ao, a1 and a2 by the method of least squares such that; y=ao+a1x+a2x², fits the following data:", 
                    x: [0, 1, 2, 3, 4, 5], 
                    y: [1, 3, 4, 6, 8, 11] 
                },
                q3: { 
                    text: "Q3: Determine the constants a and b by the method of least squares such that y=a*e^(bx) fits the following data:", 
                    x: [2, 4, 6, 8, 10], 
                    y: [4.077, 11.084, 30.128, 81.897, 222.62] 
                }
            };

            // توليد قيمة X عشوائية لكل طالب عند التسجيل لضمان النزاهة
            useEffect(() => {
                const rand = (Math.random() * (4.2 - 1.2) + 1.2).toFixed(1);
                setTargetX(parseFloat(rand));
            }, []);

            const calculateGrade = () => {
                let score = 0;
                const tolerance = 0.05;

                // --- تصحيح السؤال الأول (y = x^2 + 1) ---
                const correctVal = (targetX * targetX) + 1;
                const correctInt = Math.floor(correctVal);

                const gradeMethod = (input, isLagrange = false) => {
                    const ans = parseFloat(input || 0);
                    const full = isLagrange ? 2.0 : 1.5;
                    const partial = isLagrange ? 1.5 : 1.0;
                    const wrong = isLagrange ? 1.0 : 0.5;

                    if (Math.abs(ans - correctVal) < tolerance) return full;
                    if (Math.floor(ans) === correctInt) return partial;
                    return wrong;
                };

                score += gradeMethod(studentAns.q1f); // Newton F
                score += gradeMethod(studentAns.q1b); // Newton B
                score += gradeMethod(studentAns.q1l, true); // Lagrange

                // --- تصحيح السؤال الثاني (y = 1.07 + 1.56x + 0.09x^2 تقريبا) ---
                const q2Correct = { a0: 1, a1: 1, a2: 0 }; // تبسيط للعدد الصحيح
                let q2Matches = 0;
                if (Math.floor(parseFloat(studentAns.q2a0 || 0)) === q2Correct.a0) q2Matches++;
                if (Math.floor(parseFloat(studentAns.q2a1 || 0)) === q2Correct.a1) q2Matches++;
                if (Math.floor(parseFloat(studentAns.q2a2 || 0)) === q2Correct.a2) q2Matches++;
                
                if (q2Matches === 3) score += 2.5;
                else if (q2Matches === 2) score += 2.0;
                else if (q2Matches === 1) score += 1.5;
                else score += 1.0;

                // --- تصحيح السؤال الثالث (y = 1.5 * e^0.5x) ---
                const q3Correct = { a: 1, b: 0 }; // تبسيط للعدد الصحيح (1.5 و 0.5)
                let q3Matches = 0;
                if (Math.floor(parseFloat(studentAns.q3a || 0)) === q3Correct.a) q3Matches++;
                if (Math.floor(parseFloat(studentAns.q3b || 0)) === q3Correct.b) q3Matches++;
                
                if (q3Matches === 2) score += 2.5;
                else if (q3Matches === 1) score += 1.5;
                else score += 1.0;

                return Math.min(score, 10).toFixed(2);
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file.size > 8 * 1024 * 1024) {
                    alert("حجم الملف يجب أن لا يتجاوز 8 ميجابايت");
                    e.target.value = "";
                    return;
                }
                const reader = new FileReader();
                reader.onload = () => setPdfBase64(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            };

            const handleSubmit = async () => {
                if (!pdfBase64) return alert("يرجى رفع ملف الحل اليدوي PDF أولاً");
                setIsSubmitting(true);
                
                const payload = {
                    name: studentInfo.name,
                    studyType: studentInfo.studyType,
                    grade: calculateGrade(),
                    studentAnswers: studentAns,
                    pdfBase64: pdfBase64,
                    timestamp: new Date().toLocaleString('ar-IQ')
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                    setStep('success');
                } catch (e) {
                    alert("حدث خطأ أثناء الإرسال، يرجى المحاولة مرة أخرى");
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen py-6 px-4">
                    <div className="max-w-2xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden border-t-[14px] border-blue-900">
                        
                        {/* Header Section */}
                        <div className="p-6 bg-white border-b-2 border-slate-100 flex justify-between items-center">
                            <div className="text-right">
                                <h1 className="text-2xl font-black text-blue-900">جامعة تكريت</h1>
                                <p className="text-sm font-bold text-slate-500">كلية الهندسة - قسم الهندسة المدنية</p>
                            </div>
                            <div className="text-left">
                                <div className="bg-blue-900 text-white px-4 py-1 rounded-lg font-bold text-sm">التحليلات العددية</div>
                            </div>
                        </div>

                        {step === 'register' && (
                            <div className="p-10 text-right">
                                <h2 className="text-xl font-black mb-8 border-b pb-4 flex items-center gap-2">
                                    <span className="w-3 h-3 bg-blue-600 rounded-full"></span> تسجيل بيانات الطالب
                                </h2>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-bold mb-2 mr-2">الاسم الثلاثي باللغة العربية:</label>
                                        <input 
                                            type="text" 
                                            className="w-full p-4 border-2 rounded-2xl focus:border-blue-500 outline-none bg-slate-50 transition-all"
                                            placeholder="ادخل اسمك الكامل هنا..."
                                            onChange={e => setStudentInfo({...studentInfo, name: e.target.value})}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-2 mr-2">نوع الدراسة:</label>
                                        <select 
                                            className="w-full p-4 border-2 rounded-2xl bg-slate-50 outline-none"
                                            onChange={e => setStudentInfo({...studentInfo, studyType: e.target.value})}
                                        >
                                            <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>فصلي</option><option>مسائي</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="mt-10 p-5 bg-blue-50 border-r-8 border-blue-900 rounded-2xl text-blue-900 text-sm font-bold italic">
                                    ملاحظة: قم بكتابة اسمك على جميع صفحات الحل اليدوي قبل تصويرها وإرسالها.
                                </div>
                                <button 
                                    onClick={() => setStep('q1')} 
                                    disabled={!studentInfo.name}
                                    className="w-full mt-10 bg-blue-900 text-white font-black py-5 rounded-2xl hover:bg-blue-800 disabled:opacity-30 transition-all text-xl shadow-xl"
                                >ابدأ حل الواجب</button>
                            </div>
                        )}

                        {step === 'q1' && (
                            <div className="p-8 text-right animate-fadeIn">
                                <div className="bg-blue-50 p-5 rounded-2xl border-r-8 border-blue-900 mb-8 font-bold text-slate-800 leading-relaxed shadow-sm">
                                    {hwData.q1.text}
                                </div>
                                <div className="overflow-x-auto mb-8 rounded-xl border border-slate-200">
                                    <table className="w-full text-center border-collapse">
                                        <tr className="bg-blue-900 text-white font-bold">
                                            <td className="p-3 border border-blue-800">x</td>{hwData.q1.x.map((v, i) => <td key={i} className="p-3 border border-blue-800 font-mono">{v}</td>)}
                                        </tr>
                                        <tr className="bg-white">
                                            <td className="p-3 border font-bold">y</td>{hwData.q1.y.map((v, i) => <td key={i} className="p-3 border font-mono">{v}</td>)}
                                        </tr>
                                    </table>
                                </div>
                                <div className="space-y-4">
                                    {['f', 'b', 'l'].map((m, i) => (
                                        <div key={m} className="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border">
                                            <label className="w-1/3 text-xs font-black text-slate-500">
                                                {m==='f' ? 'Newton Forward' : m==='b' ? 'Newton Backward' : 'Lagrange'}
                                            </label>
                                            <input 
                                                type="number" step="any" placeholder="الناتج..."
                                                className="w-2/3 p-2 border-b-2 border-blue-200 bg-transparent outline-none focus:border-blue-900 text-center font-mono"
                                                onChange={e => setStudentAns({...studentAns, ['q1'+m]: e.target.value})}
                                            />
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-10 flex justify-end">
                                    <button onClick={() => setStep('q2')} className="bg-blue-900 text-white px-10 py-3 rounded-2xl font-black shadow-lg hover:bg-blue-800 flex items-center gap-2">
                                        السؤال التالي <ChevronLeft size={20} />
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'q2' && (
                            <div className="p-8 text-right">
                                <div className="bg-blue-50 p-5 rounded-2xl border-r-8 border-blue-900 mb-6 font-bold text-slate-800 leading-relaxed shadow-sm">
                                    {hwData.q2.text}
                                </div>
                                <img src="https://latex.codecogs.com/png.latex?\dpi{150}y=a_0+a_1x+a_2x^2" className="equation-img" alt="equation" />
                                <div className="overflow-x-auto mb-8 rounded-xl border border-slate-200">
                                    <table className="w-full text-center border-collapse text-xs">
                                        <tr className="bg-blue-900 text-white font-bold">
                                            <td className="p-2 border border-blue-800">x</td>{hwData.q2.x.map((v, i) => <td key={i} className="p-2 border border-blue-800 font-mono">{v}</td>)}
                                        </tr>
                                        <tr className="bg-white">
                                            <td className="p-2 border font-bold">y</td>{hwData.q2.y.map((v, i) => <td key={i} className="p-2 border font-mono">{v}</td>)}
                                        </tr>
                                    </table>
                                </div>
                                <div className="grid grid-cols-3 gap-4">
                                    {['a0', 'a1', 'a2'].map(v => (
                                        <div key={v} className="text-center">
                                            <label className="block text-xs font-black mb-1 text-blue-900">{v}</label>
                                            <input 
                                                type="number" step="any" className="w-full p-3 border-2 rounded-xl text-center font-mono"
                                                onChange={e => setStudentAns({...studentAns, ['q2'+v]: e.target.value})}
                                            />
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-10 flex justify-between">
                                    <button onClick={() => setStep('q1')} className="text-slate-400 font-black flex items-center gap-1 hover:text-blue-900"><ChevronRight size={20}/> السابق</button>
                                    <button onClick={() => setStep('q3')} className="bg-blue-900 text-white px-10 py-3 rounded-2xl font-black shadow-lg flex items-center gap-2">التالي <ChevronLeft size={20}/></button>
                                </div>
                            </div>
                        )}

                        {step === 'q3' && (
                            <div className="p-8 text-right">
                                <div className="bg-blue-50 p-5 rounded-2xl border-r-8 border-blue-900 mb-6 font-bold text-slate-800 leading-relaxed shadow-sm">
                                    {hwData.q3.text}
                                </div>
                                <img src="https://latex.codecogs.com/png.latex?\dpi{150}y=a \cdot e^{bx}" className="equation-img" alt="equation" />
                                <div className="overflow-x-auto mb-8 rounded-xl border border-slate-200">
                                    <table className="w-full text-center border-collapse text-xs">
                                        <tr className="bg-blue-900 text-white font-bold">
                                            <td className="p-2 border border-blue-800">x</td>{hwData.q3.x.map((v, i) => <td key={i} className="p-2 border border-blue-800 font-mono">{v}</td>)}
                                        </tr>
                                        <tr className="bg-white">
                                            <td className="p-2 border font-bold">y</td>{hwData.q3.y.map((v, i) => <td key={i} className="p-2 border font-mono">{v}</td>)}
                                        </tr>
                                    </table>
                                </div>
                                <div className="grid grid-cols-2 gap-6">
                                    {['a', 'b'].map(v => (
                                        <div key={v} className="text-center">
                                            <label className="block text-xs font-black mb-1 text-blue-900">الثابت {v}</label>
                                            <input 
                                                type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono text-lg"
                                                onChange={e => setStudentAns({...studentAns, ['q3'+v]: e.target.value})}
                                            />
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-10 flex justify-between">
                                    <button onClick={() => setStep('q2')} className="text-slate-400 font-black flex items-center gap-1"><ChevronRight size={20}/> السابق</button>
                                    <button onClick={() => setStep('submit')} className="bg-blue-900 text-white px-10 py-3 rounded-2xl font-black shadow-lg flex items-center gap-2">الانتقال للرفع <ChevronLeft size={20}/></button>
                                </div>
                            </div>
                        )}

                        {step === 'submit' && (
                            <div className="p-12 text-center">
                                <h3 className="text-2xl font-black mb-8 text-blue-900">المرحلة الأخيرة: رفع الحل</h3>
                                <div className="border-4 border-dashed border-slate-200 p-12 rounded-[40px] bg-slate-50 flex flex-col items-center hover:border-blue-300 transition-all group">
                                    <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                        <span className="text-4xl">📄</span>
                                    </div>
                                    <p className="text-sm font-bold text-slate-500 mb-6 leading-relaxed">
                                        ارفق ملف واحد فقط بصيغة pdf لجميع الحلول اليدوية<br/>على أن لا يتجاوز حجم الملف ٨ ميكابايت
                                    </p>
                                    <input type="file" id="pdfFile" accept="application/pdf" className="hidden" onChange={handleFile} />
                                    <label htmlFor="pdfFile" className="bg-white border-2 border-blue-900 text-blue-900 px-10 py-3 rounded-2xl cursor-pointer font-black shadow-sm hover:bg-blue-900 hover:text-white transition-all">
                                        {pdfBase64 ? "✅ تم اختيار الملف" : "اختيار ملف الحل"}
                                    </label>
                                </div>
                                <div className="mt-10 flex gap-4">
                                    <button onClick={() => setStep('q3')} className="flex-1 bg-slate-200 py-4 rounded-2xl font-black">رجوع</button>
                                    <button 
                                        onClick={handleSubmit} 
                                        disabled={!pdfBase64 || isSubmitting}
                                        className="flex-[2] bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-xl flex items-center justify-center gap-3 disabled:opacity-30"
                                    >
                                        {isSubmitting ? "جاري الإرسال..." : "تأكيد التسليم النهائي"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'success' && (
                            <div className="p-20 text-center animate-bounceIn">
                                <div className="w-32 h-32 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-10 shadow-inner">
                                    <span className="text-6xl">✔️</span>
                                </div>
                                <h2 className="text-4xl font-black text-slate-900 mb-6">تم التسليم بنجاح!</h2>
                                <p className="text-slate-500 text-xl font-bold leading-loose">
                                    لقد قمت بتسليم بنجاح يا <span className="text-blue-900">{studentInfo.name}</span>.<br/>
                                    ستظهر إجاباتك عند الأستاذ الآن.
                                </p>
                                <div className="mt-12 text-blue-900 font-black text-sm p-4 bg-slate-50 rounded-2xl inline-block border">
                                    جامعة تكريت - كلية الهندسة - قسم الهندسة المدنية
                                </div>
                            </div>
                        )}

                    </div>
                    <div className="mt-8 text-center text-slate-400 text-[10px] font-bold">
                        نظام إدارة الواجبات الذكي &copy; جامعة تكريت ٢٠٢٤
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Helper Icons Components
        function ChevronLeft({size}) { return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg> }
        function ChevronRight({size}) { return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg> }
    </script>
</body>
</html>
    return ContentService.createTextOutput("Success").setMimeType(ContentService.MimeType.TEXT);
  } catch (err) {
    return ContentService.createTextOutput("Error").setMimeType(ContentService.MimeType.TEXT);
  }
}
