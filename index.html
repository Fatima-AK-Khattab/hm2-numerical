<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة تكريت - واجب التحليلات العددية</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .equation-box { background: white; border: 2px solid #e2e8f0; border-radius: 1rem; padding: 1rem; margin: 1rem 0; text-align: center; font-style: italic; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ضعي رابط Google Script الخاص بكِ هنا ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUteY1C_qUX0o8CCGgWtSkUltP7MqAM_WQGZVDSOrkSyF2SN0oBnT5sRtTsdZODYc/exec";

        function App() {
            const [step, setStep] = useState('register');
            const [studentInfo, setStudentInfo] = useState({ name: '', studyType: 'صباحي A' });
            const [studentAns, setStudentAns] = useState({});
            const [pdfBase64, setPdfBase64] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            // بيانات الأسئلة ثابتة
            const hwData = {
                q1: { target: 1.5, x: [1,2,3,4,5], y: [2,5,10,17,26] },
                q2: { x: [0,1,2,3,4,5], y: [1,3,4,6,8,11] },
                q3: { x: [2,4,6,8,10], y: [4.077, 11.084, 30.128, 81.897, 222.62] }
            };

            const calculateGrade = () => {
                let score = 0;
                // منطق التصحيح للسؤال الأول (y = x^2 + 1)
                const correctQ1 = hwData.q1.target * hwData.q1.target + 1; // 3.25
                const checkQ1 = (val) => {
                    const ans = parseFloat(val || 0);
                    if (ans === 3.25) return 1.5;
                    if (Math.floor(ans) === 3) return 1.0;
                    return 0.5;
                };

                score += checkQ1(studentAns.q1f); // Forward
                score += checkQ1(studentAns.q1b); // Backward
                
                // Lagrange (2.0)
                const ansL = parseFloat(studentAns.q1l || 0);
                if (ansL === 3.25) score += 2.0;
                else if (Math.floor(ansL) === 3) score += 1.5;
                else score += 1.0;

                // السؤال الثاني والثالث (محاكاة التصحيح بناءً على العدد الصحيح)
                // في الواقع ستقارنين بالقيم الحقيقية المحسوبة من شيت الإكسل
                score += 5; // مجموع افتراضي للأسئلة الأخرى للتبسيط

                return Math.min(score, 10).toFixed(2);
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = () => setPdfBase64(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            };

            const handleSubmit = async () => {
                if (!pdfBase64) return alert("يرجى إرفاق ملف PDF");
                setIsSubmitting(true);
                const grade = calculateGrade();

                const payload = {
                    name: studentInfo.name,
                    studyType: studentInfo.studyType,
                    grade: grade,
                    studentAnswers: studentAns,
                    pdfBase64: pdfBase64,
                    timestamp: new Date().toLocaleString('ar-IQ')
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                    setStep('success');
                } catch (e) {
                    alert("خطأ في الاتصال، حاول مجدداً");
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen py-10 px-4">
                    <div className="max-w-2xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden border-t-[12px] border-blue-900">
                        
                        {/* Header */}
                        <div className="p-6 border-b flex justify-between items-center">
                            <div className="flex items-center gap-4 text-right">
                                <div className="text-blue-900 font-black text-xl">جامعة تكريت</div>
                                <div className="text-xs text-slate-500 font-bold">كلية الهندسة - الهندسة المدنية</div>
                            </div>
                            <div className="text-blue-900 font-black">التحليلات العددية</div>
                        </div>

                        {step === 'register' && (
                            <div className="p-8 text-right">
                                <h3 className="text-xl font-bold mb-6 border-b pb-2">تسجيل بيانات الطالب</h3>
                                <input 
                                    type="text" placeholder="الاسم الثلاثي باللغة العربية"
                                    className="w-full p-4 border rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-blue-500"
                                    onChange={(e) => setStudentInfo({...studentInfo, name: e.target.value})}
                                />
                                <select 
                                    className="w-full p-4 border rounded-2xl mb-8"
                                    onChange={(e) => setStudentInfo({...studentInfo, studyType: e.target.value})}
                                >
                                    <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>مسائي</option>
                                </select>
                                <div className="p-4 bg-yellow-50 text-yellow-800 text-sm rounded-xl border-r-4 border-yellow-500 mb-8">
                                    ملاحظة: اكتب اسمك على جميع أوراق الحل اليدوي قبل التصوير.
                                </div>
                                <button 
                                    onClick={() => setStep('q1')} disabled={!studentInfo.name}
                                    className="w-full bg-blue-900 text-white font-bold py-4 rounded-2xl shadow-lg disabled:opacity-30"
                                >ابدأ الحل الآن</button>
                            </div>
                        )}

                        {step === 'q1' && (
                            <div className="p-8 text-right">
                                <h3 className="font-bold text-lg mb-4 text-blue-900">السؤال الأول (x = {hwData.q1.target})</h3>
                                <table className="w-full text-center border mb-6 text-sm">
                                    <tr className="bg-slate-100 font-bold"><td>x</td>{hwData.q1.x.map(v => <td>{v}</td>)}</tr>
                                    <tr><td>y</td>{hwData.q1.y.map(v => <td>{v}</td>)}</tr>
                                </table>
                                <div className="space-y-4">
                                    <input type="number" placeholder="Newton Forward" className="w-full p-3 border rounded-xl" onChange={e => setStudentAns({...studentAns, q1f: e.target.value})} />
                                    <input type="number" placeholder="Newton Backward" className="w-full p-3 border rounded-xl" onChange={e => setStudentAns({...studentAns, q1b: e.target.value})} />
                                    <input type="number" placeholder="Lagrange" className="w-full p-3 border rounded-xl" onChange={e => setStudentAns({...studentAns, q1l: e.target.value})} />
                                </div>
                                <button onClick={() => setStep('q2')} className="w-full mt-8 bg-blue-900 text-white py-3 rounded-xl font-bold">السؤال التالي</button>
                            </div>
                        )}

                        {step === 'q2' && (
                            <div className="p-8 text-right">
                                <h3 className="font-bold text-lg mb-4 text-blue-900">السؤال الثاني والثالث</h3>
                                <div className="equation-box">y = a0 + a1x + a2x²</div>
                                <div className="grid grid-cols-3 gap-2 mb-8">
                                    <input type="number" placeholder="a0" className="p-2 border rounded" onChange={e => setStudentAns({...studentAns, q2a0: e.target.value})} />
                                    <input type="number" placeholder="a1" className="p-2 border rounded" onChange={e => setStudentAns({...studentAns, q2a1: e.target.value})} />
                                    <input type="number" placeholder="a2" className="p-2 border rounded" onChange={e => setStudentAns({...studentAns, q2a2: e.target.value})} />
                                </div>
                                <div className="equation-box">y = a * e^(bx)</div>
                                <div className="grid grid-cols-2 gap-2 mb-8">
                                    <input type="number" placeholder="a" className="p-2 border rounded" onChange={e => setStudentAns({...studentAns, q3a: e.target.value})} />
                                    <input type="number" placeholder="b" className="p-2 border rounded" onChange={e => setStudentAns({...studentAns, q3b: e.target.value})} />
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep('q1')} className="flex-1 bg-slate-200 py-3 rounded-xl">السابق</button>
                                    <button onClick={() => setStep('submit')} className="flex-[2] bg-blue-900 text-white py-3 rounded-xl font-bold">الانتقال للرفع</button>
                                </div>
                            </div>
                        )}

                        {step === 'submit' && (
                            <div className="p-10 text-center">
                                <h3 className="font-black text-xl mb-6">رفع الحل اليدوي</h3>
                                <div className="border-4 border-dashed p-10 rounded-3xl bg-slate-50 mb-8">
                                    <input type="file" accept="application/pdf" onChange={handleFile} className="mb-4" />
                                    <p className="text-xs text-slate-500 font-bold">ارفق ملف واحد PDF (بحد أقصى 8 ميجابايت)</p>
                                </div>
                                <button 
                                    onClick={handleSubmit} disabled={isSubmitting || !pdfBase64}
                                    className="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl disabled:opacity-30"
                                >
                                    {isSubmitting ? "جاري الإرسال..." : "تأكيد التسليم النهائي"}
                                </button>
                            </div>
                        )}

                        {step === 'success' && (
                            <div className="p-20 text-center">
                                <div className="text-6xl mb-6">✅</div>
                                <h2 className="text-2xl font-black mb-4">تم التسليم بنجاح!</h2>
                                <p className="text-slate-500">لقد قمت بتسليم بنجاح ستظهر اجاباتك عند الأستاذ.</p>
                                <p className="mt-4 font-bold text-blue-900">جامعة تكريت - الهندسة المدنية</p>
                            </div>
                        )}

                    </div>
                    <p className="text-center text-slate-400 text-[10px] mt-6">نظام جامعة تكريت الذكي لإدارة الواجبات ٢٠٢٤</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
