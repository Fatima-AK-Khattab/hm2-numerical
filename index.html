<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة تكريت - واجب التحليلات العددية</title>
    <!-- استيراد المكتبات اللازمة -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .equation-img { max-height: 85px; margin: 20px auto; display: block; filter: contrast(1.1); }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .no-select { user-select: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ضعي رابط Web App URL الجديد الخاص بكِ هنا ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzG_5wsop7lJeh1SpBktAe_IJtx7p8RCouFv5tJX7BZj0iYpx5CJsEdMFhBifGYyq2k/exec";

        function App() {
            const [step, setStep] = useState('register');
            const [studentInfo, setStudentInfo] = useState({ name: '', studyType: 'صباحي A' });
            const [ans, setAns] = useState({});
            const [targetX, setTargetX] = useState(1.5);
            const [pdfBase64, setPdfBase64] = useState(null);
            const [loading, setLoading] = useState(false);

            // توليد قيمة X عشوائية غير صحيحة عند فتح التطبيق
            useEffect(() => {
                let val;
                do {
                    val = (Math.random() * (4.7 - 1.2) + 1.2).toFixed(2);
                } while (val % 1 === 0); 
                setTargetX(parseFloat(val));
            }, []);

            const hwData = {
                q1: { 
                    text: "Q1: Given the following data, Approximate the functional value at (x=" + targetX + ") using Newton forward, Newton backward, and Lagrange interpolating.", 
                    x: [1, 2, 3, 4, 5], 
                    y: [2, 5, 10, 17, 26] 
                },
                q2: { 
                    text: "Q2: Determine the constants ao, a1 and a2 by the method of least squares such that y=ao+a1x+a2x², fits the following data:", 
                    x: [0, 1, 2, 3, 4, 5], 
                    y: [1, 3, 4, 6, 8, 11] 
                },
                q3: { 
                    text: "Q3: Determine the constants a and b by the method of least squares such that y=a*e^(bx) fits the following data:", 
                    x: [2, 4, 6, 8, 10], 
                    y: [4.077, 11.084, 30.128, 81.897, 222.62] 
                }
            };

            const calculateGrade = () => {
                let totalScore = 0;
                const tolerance = 0.04;
                const correctY = (targetX * targetX) + 1; // الدالة النموذجية y = x^2 + 1
                const correctInt = Math.floor(correctY);

                const getPartGrade = (input, max) => {
                    const val = parseFloat(input || 0);
                    if (Math.abs(val - correctY) < tolerance) return max;
                    if (Math.floor(val) === correctInt) return max - 0.5;
                    return 0.5;
                };

                // توزيع الدرجات المطلوب (١٠ درجات كلي)
                totalScore += getPartGrade(ans.q1f, 1.5); // Newton F
                totalScore += getPartGrade(ans.q1b, 1.5); // Newton B
                totalScore += getPartGrade(ans.q1l, 2.0); // Lagrange

                // السؤال الثاني والثالث (افتراضي ٢.٥ لكل سؤال عند الإدخال)
                totalScore += (ans.q2a0 && ans.q2a1 && ans.q2a2) ? 2.5 : 1.0;
                totalScore += (ans.q3a && ans.q3b) ? 2.5 : 1.0;

                return Math.min(totalScore, 10).toFixed(2);
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file && file.size <= 8 * 1024 * 1024) {
                    const reader = new FileReader();
                    reader.onload = () => setPdfBase64(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                } else {
                    alert("حجم الملف يجب أن لا يتجاوز 8 ميجابايت");
                }
            };

            const submitAssignment = async () => {
                if (!pdfBase64) return alert("يرجى إرفاق ملف PDF للحل اليدوي");
                setLoading(true);

                const payload = {
                    name: studentInfo.name,
                    studyType: studentInfo.studyType,
                    grade: calculateGrade(),
                    studentAnswers: { ...ans, x_value: targetX },
                    pdfBase64: pdfBase64,
                    timestamp: new Date().toLocaleString('ar-IQ')
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                    setStep('success');
                } catch (e) {
                    alert("حدث خطأ في الإرسال، يرجى إعادة المحاولة");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen py-8 px-4 flex flex-col items-center">
                    <div className="w-full max-w-2xl bg-white shadow-2xl rounded-[2.5rem] overflow-hidden border-t-[12px] border-blue-900">
                        
                        {/* ترويسة جامعة تكريت */}
                        <div className="p-6 bg-white border-b flex justify-between items-center no-select">
                            <div className="text-right">
                                <h1 className="text-2xl font-black text-blue-900">جامعة تكريت</h1>
                                <p className="text-[10px] font-bold text-slate-500 uppercase">كلية الهندسة - قسم الهندسة المدنية</p>
                            </div>
                            <div className="text-left font-black text-blue-900 border-2 border-blue-900 px-3 py-1 rounded-xl text-sm italic">
                                Numerical Analysis
                            </div>
                        </div>

                        {step === 'register' && (
                            <div className="p-10 text-right">
                                <h2 className="text-xl font-black mb-8 border-r-8 border-blue-600 pr-3 text-slate-800">بيانات الطالب</h2>
                                <div className="space-y-6">
                                    <input 
                                        type="text" placeholder="الاسم الثلاثي باللغة العربية" 
                                        className="w-full p-4 border-2 rounded-2xl focus:border-blue-500 outline-none transition-all shadow-sm bg-slate-50"
                                        onChange={e => setStudentInfo({...studentInfo, name: e.target.value})} 
                                    />
                                    <select 
                                        className="w-full p-4 border-2 rounded-2xl bg-slate-50 font-bold outline-none" 
                                        onChange={e => setStudentInfo({...studentInfo, studyType: e.target.value})}
                                    >
                                        <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>فصلي</option><option>مسائي</option>
                                    </select>
                                </div>
                                <div className="mt-8 p-4 bg-blue-50 border-r-4 border-blue-900 rounded-xl text-blue-900 text-xs font-bold italic leading-relaxed">
                                    ملاحظة: تأكد من كتابة اسمك على جميع صفحات الحل اليدوي قبل التصوير والرفع.
                                </div>
                                <button 
                                    onClick={() => setStep('q1')} disabled={!studentInfo.name} 
                                    className="w-full mt-10 bg-blue-900 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-800 disabled:opacity-30 transition-all text-xl"
                                >ابدأ حل الواجب</button>
                            </div>
                        )}

                        {step === 'q1' && (
                            <div className="p-8 text-right">
                                <div className="bg-slate-50 p-5 rounded-2xl border-r-8 border-blue-900 mb-6 font-bold text-sm leading-relaxed text-slate-700">
                                    {hwData.q1.text}
                                </div>
                                <div className="overflow-x-auto mb-8 rounded-xl border border-slate-200 shadow-sm">
                                    <table className="w-full text-center border-collapse text-xs">
                                        <tr className="bg-blue-900 text-white font-bold">
                                            <td className="p-3 border border-blue-800">x</td>{hwData.q1.x.map(v => <td className="p-3 border border-blue-800 font-mono">{v}</td>)}
                                        </tr>
                                        <tr className="bg-white">
                                            <td className="p-3 border font-bold">y</td>{hwData.q1.y.map(v => <td className="p-3 border font-mono">{v}</td>)}
                                        </tr>
                                    </table>
                                </div>
                                <div className="space-y-4">
                                    {['f', 'b', 'l'].map(m => (
                                        <input 
                                            key={m} type="number" step="any" 
                                            placeholder={m==='f' ? "Newton Forward Result" : m==='b' ? "Newton Backward Result" : "Lagrange Result"} 
                                            className="w-full p-3 border-2 rounded-xl text-center font-mono focus:border-blue-500 outline-none" 
                                            onChange={e => setAns({...ans, ['q1'+m]: e.target.value})} 
                                        />
                                    ))}
                                </div>
                                <button onClick={() => setStep('q2')} className="w-full mt-8 bg-blue-900 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2">السؤال التالي</button>
                            </div>
                        )}

                        {step === 'q2' && (
                            <div className="p-8 text-right">
                                <div className="bg-slate-50 p-5 rounded-2xl border-r-8 border-blue-900 mb-4 font-bold text-sm leading-relaxed text-slate-700">{hwData.q2.text}</div>
                                <img src="https://latex.codecogs.com/png.latex?\dpi{150}y=a_0+a_1x+a_2x^2" className="equation-img" alt="equation" />
                                <div className="grid grid-cols-3 gap-2 mb-8">
                                    {['a0', 'a1', 'a2'].map(v => (
                                        <input key={v} type="number" step="any" placeholder={v} className="p-3 border-2 rounded-xl text-center font-mono" onChange={e => setAns({...ans, ['q2'+v]: e.target.value})} />
                                    ))}
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep('q1')} className="flex-1 bg-slate-200 py-3 rounded-xl font-bold">السابق</button>
                                    <button onClick={() => setStep('q3')} className="flex-[2] bg-blue-900 text-white py-3 rounded-xl font-bold">التالي</button>
                                </div>
                            </div>
                        )}

                        {step === 'q3' && (
                            <div className="p-8 text-right">
                                <div className="bg-slate-50 p-5 rounded-2xl border-r-8 border-blue-900 mb-4 font-bold text-sm leading-relaxed text-slate-700">{hwData.q3.text}</div>
                                <img src="https://latex.codecogs.com/png.latex?\dpi{150}y=a \cdot e^{bx}" className="equation-img" alt="equation" />
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <input type="number" step="any" placeholder="Constant a" className="p-3 border-2 rounded-xl text-center font-mono" onChange={e => setAns({...ans, q3a: e.target.value})} />
                                    <input type="number" step="any" placeholder="Constant b" className="p-3 border-2 rounded-xl text-center font-mono" onChange={e => setAns({...ans, q3b: e.target.value})} />
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep('q2')} className="flex-1 bg-slate-200 py-3 rounded-xl font-bold">السابق</button>
                                    <button onClick={() => setStep('submit')} className="flex-[2] bg-blue-900 text-white py-3 rounded-xl font-bold">الانتقال للرفع</button>
                                </div>
                            </div>
                        )}

                        {step === 'submit' && (
                            <div className="p-10 text-center">
                                <h3 className="text-xl font-black mb-8 text-blue-900">رفع ملف الحل اليدوي (PDF)</h3>
                                <div className="border-4 border-dashed p-10 rounded-3xl bg-slate-50 mb-8 border-blue-100 flex flex-col items-center">
                                    <input type="file" accept="application/pdf" onChange={handleFile} className="mb-4 block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-black file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
                                    <p className="text-[10px] text-slate-400 font-bold italic">ارفق ملف PDF واحد فقط بحد أقصى 8 ميجابايت</p>
                                </div>
                                <button 
                                    onClick={submitAssignment} disabled={loading || !pdfBase64} 
                                    className="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl disabled:opacity-30 flex items-center justify-center gap-3"
                                >
                                    {loading ? "جاري الإرسال..." : "تأكيد التسليم النهائي"}
                                </button>
                            </div>
                        )}

                        {step === 'success' && (
                            <div className="p-20 text-center bg-white">
                                <div className="text-8xl mb-6">🎓</div>
                                <h2 className="text-3xl font-black mb-4 text-blue-900">تم التسليم بنجاح!</h2>
                                <p className="text-slate-600 font-bold mb-10 leading-loose">
                                    لقد قمت بتسليم بنجاح يا <span className="text-blue-700 underline">{studentInfo.name}</span>.<br/>
                                    ستظهر إجاباتك عند الأستاذ الآن بشكل منظم.
                                </p>
                                <div className="inline-block p-4 border-4 border-double border-blue-900 rounded-3xl text-blue-900 font-black">
                                    جامعة تكريت - قسم الهندسة المدنية
                                </div>
                            </div>
                        )}

                    </div>
                    <p className="mt-8 text-slate-400 text-[10px] font-bold text-center">نظام إدارة الواجبات الذكي &copy; جامعة تكريت ٢٠٢٤</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
