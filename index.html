<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة تكريت - واجب التحليلات العددية</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .equation-img { max-height: 85px; margin: 15px auto; display: block; filter: contrast(1.1); }
        .error-shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        input::placeholder { font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ضعي رابط Web App URL الخاص بكِ هنا ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzq5xKpz5V4MId-vQVsrcm7XNhBbNseP3fExM9A1hN2gHM2tmAlp5ACCzTASvKGXwE3/exec";

        function App() {
            const [step, setStep] = useState('register');
            const [studentInfo, setStudentInfo] = useState({ name: '', studyType: 'صباحي A' });
            const [ans, setAns] = useState({});
            const [targetX, setTargetX] = useState(1.5);
            const [pdfBase64, setPdfBase64] = useState(null);
            const [loading, setLoading] = useState(false);
            const [showError, setShowError] = useState(false);

            useEffect(() => {
                let val = (Math.random() * (4.7 - 1.2) + 1.2).toFixed(2);
                if (val % 1 === 0) val = (parseFloat(val) + 0.13).toFixed(2);
                setTargetX(parseFloat(val));
            }, []);

            // دالة للتحقق من أن جميع الحقول في الخطوة الحالية ممتلئة
            const isStepValid = () => {
                if (step === 'register') return studentInfo.name.trim().length > 5;
                if (step === 'q1') return ans.q1f && ans.q1b && ans.q1l;
                if (step === 'q2') return ans.q2a0 && ans.q2a1 && ans.q2a2;
                if (step === 'q3') return ans.q3a && ans.q3b;
                return true;
            };

            const calculateGrade = () => {
                let score = 0;
                const tolerance = 0.04;
                const correctY = (targetX * targetX) + 1;
                const correctInt = Math.floor(correctY);

                const getGrade = (val, max) => {
                    const input = parseFloat(val || 0);
                    if (Math.abs(input - correctY) < tolerance) return max;
                    if (Math.floor(input) === correctInt) return max - 0.5;
                    return 0.5;
                };

                score += getGrade(ans.q1f, 1.5);
                score += getGrade(ans.q1b, 1.5);
                score += getGrade(ans.q1l, 2.0);
                score += (ans.q2a0 && ans.q2a1) ? 2.5 : 1.0;
                score += (ans.q3a && ans.q3b) ? 2.5 : 1.0;
                return Math.min(score, 10).toFixed(2);
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file && file.size <= 8 * 1024 * 1024) {
                    const reader = new FileReader();
                    reader.onload = () => setPdfBase64(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                } else {
                    alert("الملف كبير جداً (الأقصى 8 ميجابايت)");
                }
            };

            const nextStep = (next) => {
                if (isStepValid()) {
                    setStep(next);
                    setShowError(false);
                } else {
                    setShowError(true);
                    setTimeout(() => setShowError(false), 2000);
                }
            };

            const submitAssignment = async () => {
                if (!pdfBase64) return alert("يرجى إرفاق ملف الحل اليدوي PDF أولاً");
                setLoading(true);

                const payload = {
                    name: studentInfo.name,
                    studyType: studentInfo.studyType,
                    grade: calculateGrade(),
                    studentAnswers: { ...ans, x_value: targetX },
                    pdfBase64: pdfBase64,
                    timestamp: new Date().toLocaleString('ar-IQ')
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                    setStep('success');
                } catch (e) {
                    alert("خطأ في الإرسال، حاول مجدداً");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen py-8 px-4 flex flex-col items-center">
                    <div className="w-full max-w-2xl bg-white shadow-2xl rounded-[2.5rem] overflow-hidden border-t-[14px] border-blue-900 transition-all">
                        
                        {/* Header */}
                        <div className="p-6 bg-white border-b flex justify-between items-center select-none">
                            <div className="text-right">
                                <h1 className="text-2xl font-black text-blue-900 leading-none">جامعة تكريت</h1>
                                <p className="text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-wider">كلية الهندسة - قسم الهندسة المدنية</p>
                            </div>
                            <div className="text-left font-black text-blue-900 border-2 border-blue-900 px-3 py-1 rounded-xl text-xs italic">
                                Numerical HW2
                            </div>
                        </div>

                        {step === 'register' && (
                            <div className="p-10 text-right">
                                <h2 className="text-xl font-black mb-8 border-r-8 border-blue-600 pr-3 text-slate-800">بيانات الطالب</h2>
                                <div className={`space-y-6 ${showError ? 'error-shake' : ''}`}>
                                    <div>
                                        <label className="block text-xs font-black text-slate-400 mb-2 mr-1">الاسم الثلاثي باللغة العربية:</label>
                                        <input 
                                            type="text" placeholder="اكتب اسمك الثلاثي كاملاً..." 
                                            className="w-full p-4 border-2 rounded-2xl focus:border-blue-500 outline-none transition-all bg-slate-50"
                                            onChange={e => setStudentInfo({...studentInfo, name: e.target.value})} 
                                            value={studentInfo.name}
                                        />
                                        {showError && <p className="text-[10px] text-red-500 mt-2 font-bold mr-1">* يرجى كتابة الاسم الثلاثي كاملاً للدخول</p>}
                                    </div>
                                    <select 
                                        className="w-full p-4 border-2 rounded-2xl bg-slate-50 font-bold outline-none" 
                                        onChange={e => setStudentInfo({...studentInfo, studyType: e.target.value})}
                                        value={studentInfo.studyType}
                                    >
                                        <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>فصلي</option><option>مسائي</option>
                                    </select>
                                </div>
                                <button 
                                    onClick={() => nextStep('q1')} 
                                    className="w-full mt-12 bg-blue-900 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-800 transition-all text-xl"
                                >ابدأ حل الواجب</button>
                            </div>
                        )}

                        {step === 'q1' && (
                            <div className="p-8 text-right">
                                <button onClick={() => setStep('register')} className="text-blue-600 text-xs font-bold mb-4 flex items-center gap-1 hover:underline">
                                     ← العودة لتعديل الاسم
                                </button>
                                <div className="bg-slate-50 p-5 rounded-2xl border-r-8 border-blue-900 mb-6 font-bold text-sm leading-relaxed text-slate-700">
                                    Q1: Approximate the value at (x = {targetX}) using Newton forward, Newton backward, and Lagrange interpolating.
                                </div>
                                <div className={`space-y-4 ${showError ? 'error-shake' : ''}`}>
                                    <input type="number" step="any" placeholder="Newton Forward Result" className="w-full p-4 border-2 rounded-xl text-center font-mono focus:border-blue-500 outline-none" onChange={e => setAns({...ans, q1f: e.target.value})} value={ans.q1f || ''} />
                                    <input type="number" step="any" placeholder="Newton Backward Result" className="w-full p-4 border-2 rounded-xl text-center font-mono focus:border-blue-500 outline-none" onChange={e => setAns({...ans, q1b: e.target.value})} value={ans.q1b || ''} />
                                    <input type="number" step="any" placeholder="Lagrange Result" className="w-full p-4 border-2 rounded-xl text-center font-mono focus:border-blue-500 outline-none" onChange={e => setAns({...ans, q1l: e.target.value})} value={ans.q1l || ''} />
                                    {showError && <p className="text-center text-xs text-red-500 font-bold">يرجى ملء جميع حقول السؤال الأول</p>}
                                </div>
                                <button onClick={() => nextStep('q2')} className="w-full mt-10 bg-blue-900 text-white py-4 rounded-2xl font-black shadow-lg">السؤال التالي</button>
                            </div>
                        )}

                        {step === 'q2' && (
                            <div className="p-8 text-right">
                                <div className="bg-slate-50 p-5 rounded-2xl border-r-8 border-blue-900 mb-4 font-bold text-sm text-slate-700">Q2: constants ao, a1 and a2 for: y=ao+a1x+a2x²</div>
                                <img src="https://latex.codecogs.com/png.latex?\dpi{150}y=a_0+a_1x+a_2x^2" className="equation-img" alt="eq" />
                                <div className={`grid grid-cols-3 gap-3 ${showError ? 'error-shake' : ''}`}>
                                    <input type="number" step="any" placeholder="ao" className="p-4 border-2 rounded-xl text-center font-mono focus:border-blue-500" onChange={e => setAns({...ans, q2a0: e.target.value})} value={ans.q2a0 || ''} />
                                    <input type="number" step="any" placeholder="a1" className="p-4 border-2 rounded-xl text-center font-mono focus:border-blue-500" onChange={e => setAns({...ans, q2a1: e.target.value})} value={ans.q2a1 || ''} />
                                    <input type="number" step="any" placeholder="a2" className="p-4 border-2 rounded-xl text-center font-mono focus:border-blue-500" onChange={e => setAns({...ans, q2a2: e.target.value})} value={ans.q2a2 || ''} />
                                </div>
                                {showError && <p className="text-center text-xs text-red-500 font-bold mt-4">يرجى ملء ثوابت السؤال الثاني</p>}
                                <div className="flex gap-4 mt-10">
                                    <button onClick={() => setStep('q1')} className="flex-1 bg-slate-100 py-4 rounded-2xl font-black text-slate-500 border border-slate-200">السابق</button>
                                    <button onClick={() => nextStep('q3')} className="flex-[2] bg-blue-900 text-white py-4 rounded-2xl font-black shadow-lg">السؤال التالي</button>
                                </div>
                            </div>
                        )}

                        {step === 'q3' && (
                            <div className="p-8 text-right">
                                <div className="bg-slate-50 p-5 rounded-2xl border-r-8 border-blue-900 mb-4 font-bold text-sm text-slate-700">Q3: constants a and b for: y=a*e^(bx)</div>
                                <img src="https://latex.codecogs.com/png.latex?\dpi{150}y=a \cdot e^{bx}" className="equation-img" alt="eq" />
                                <div className={`grid grid-cols-2 gap-4 ${showError ? 'error-shake' : ''}`}>
                                    <input type="number" step="any" placeholder="a" className="p-4 border-2 rounded-xl text-center font-mono focus:border-blue-500" onChange={e => setAns({...ans, q3a: e.target.value})} value={ans.q3a || ''} />
                                    <input type="number" step="any" placeholder="b" className="p-4 border-2 rounded-xl text-center font-mono focus:border-blue-500" onChange={e => setAns({...ans, q3b: e.target.value})} value={ans.q3b || ''} />
                                </div>
                                {showError && <p className="text-center text-xs text-red-500 font-bold mt-4">يرجى ملء ثوابت السؤال الثالث</p>}
                                <div className="flex gap-4 mt-10">
                                    <button onClick={() => setStep('q2')} className="flex-1 bg-slate-100 py-4 rounded-2xl font-black text-slate-500 border border-slate-200">السابق</button>
                                    <button onClick={() => nextStep('submit')} className="flex-[2] bg-blue-900 text-white py-4 rounded-2xl font-black shadow-lg">الانتقال للرفع</button>
                                </div>
                            </div>
                        )}

                        {step === 'submit' && (
                            <div className="p-10 text-center">
                                <h3 className="text-xl font-black mb-8 text-blue-900 italic underline decoration-blue-200 underline-offset-8">المرحلة الأخيرة: رفع ملف PDF</h3>
                                <div className="border-4 border-dashed p-12 rounded-[2.5rem] bg-slate-50 mb-10 border-blue-100 flex flex-col items-center">
                                    <input type="file" accept="application/pdf" onChange={handleFile} className="mb-4 text-xs font-bold" />
                                    <p className="text-[10px] text-slate-400 font-black italic">ارفق ملف PDF واحد يضم جميع الحلول اليدوية</p>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep('q3')} className="flex-1 bg-slate-100 py-5 rounded-2xl font-black text-slate-500">رجوع للأسئلة</button>
                                    <button 
                                        onClick={submitAssignment} disabled={loading || !pdfBase64} 
                                        className="flex-[2] bg-green-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl disabled:opacity-30"
                                    >
                                        {loading ? "جاري الإرسال..." : "تأكيد التسليم النهائي"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'success' && (
                            <div className="p-20 text-center bg-white">
                                <div className="text-8xl mb-8 select-none">🎓</div>
                                <h2 className="text-3xl font-black mb-6 text-slate-900 tracking-tight">لقد قمت بالتسليم بنجاح!</h2>
                                <p className="text-slate-500 font-bold mb-12 leading-loose px-4">
                                    عزيزي الطالب <span className="text-blue-700 underline underline-offset-4 decoration-2">{studentInfo.name}</span>، تم استلام إجاباتك بنجاح.
                                </p>
                                <div className="flex flex-col gap-4 items-center">
                                    <div className="p-4 border-4 border-double border-blue-900 rounded-[2rem] text-blue-900 font-black inline-block text-sm">
                                        جامعة تكريت - قسم الهندسة المدنية
                                    </div>
                                    <button 
                                        onClick={() => setStep('register')} 
                                        className="text-xs text-slate-400 font-bold hover:text-blue-900 transition-colors mt-4"
                                    >
                                        هل هناك خطأ في الاسم؟ العودة لتعديل البيانات
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                    <p className="mt-8 text-slate-400 text-[9px] font-black tracking-widest uppercase">Smart Assignment Management System - Tikrit 2024</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
