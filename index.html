<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة تكريت - واجب التحليلات العددية</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .equation-img { max-height: 85px; margin: 20px auto; display: block; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ضعي رابط Web App URL الجديد الخاص بكِ هنا ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7bDfNwoJaaDI9BojbspL3_wHEghFsmK8LwPb2W6EhccBhz7Q8FOf_QvWq5MWMrQBp/exec";

        function App() {
            const [step, setStep] = useState('register');
            const [studentInfo, setStudentInfo] = useState({ name: '', studyType: 'صباحي A' });
            const [ans, setAns] = useState({});
            const [targetX, setTargetX] = useState(1.5);
            const [pdfBase64, setPdfBase64] = useState(null);
            const [loading, setLoading] = useState(false);

            // توليد قيمة X عشوائية (كسرية فقط) عند تحميل التطبيق
            useEffect(() => {
                let val;
                do {
                    // توليد رقم بين 1.1 و 4.9
                    val = (Math.random() * (4.9 - 1.1) + 1.1).toFixed(2);
                } while (val % 1 === 0); // التأكد من أنه ليس رقماً صحيحاً (مثل 2.00)
                setTargetX(parseFloat(val));
            }, []);

            const hwData = {
                q1: { 
                    text: "Q1: Given the following data, Approximate the functional value at (x=" + targetX + ") using Newton forward, Newton backward, and Lagrange interpolating.", 
                    x: [1, 2, 3, 4, 5], 
                    y: [2, 5, 10, 17, 26] 
                },
                q2: { 
                    text: "Q2: Determine the constants; ao, a1 and a2 by the method of least squares such that; y=ao+a1x+a2x², fits the following data:", 
                    x: [0, 1, 2, 3, 4, 5], 
                    y: [1, 3, 4, 6, 8, 11] 
                },
                q3: { 
                    text: "Q3: Determine the constants a and b by the method of least squares such that y=a*e^(bx) fits the following data:", 
                    x: [2, 4, 6, 8, 10], 
                    y: [4.077, 11.084, 30.128, 81.897, 222.62] 
                }
            };

            const calculateGrade = () => {
                let total = 0;
                const tolerance = 0.02;
                const correctY = (targetX * targetX) + 1; // الدالة الأصلية للجدول y = x^2 + 1
                const correctInt = Math.floor(correctY);

                const scoreMethod = (val, max) => {
                    const input = parseFloat(val || 0);
                    if (Math.abs(input - correctY) < tolerance) return max; // درجة كاملة (الرقم والمراتب صحيحة)
                    if (Math.floor(input) === correctInt) return max - 0.5; // درجة جزئية (الرقم الصحيح فقط صح)
                    return 0.5; // خطأ تماماً
                };

                // السؤال الأول
                total += scoreMethod(ans.q1f, 1.5);
                total += scoreMethod(ans.q1b, 1.5);
                total += scoreMethod(ans.q1l, 2.0);

                // السؤال الثاني والثالث (افتراضي 2.5 لكل منهما عند الإدخال)
                total += (ans.q2a0 && ans.q2a1 && ans.q2a2) ? 2.5 : 1.0;
                total += (ans.q3a && ans.q3b) ? 2.5 : 1.0;

                return Math.min(total, 10).toFixed(2);
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file && file.size <= 8 * 1024 * 1024) {
                    const reader = new FileReader();
                    reader.onload = () => setPdfBase64(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                } else {
                    alert("الملف كبير جداً (الحد الأقصى 8 ميجابايت)");
                }
            };

            const submitAssignment = async () => {
                if (!pdfBase64) return alert("يرجى إرفاق ملف PDF للحل اليدوي");
                setLoading(true);

                const payload = {
                    name: studentInfo.name,
                    studyType: studentInfo.studyType,
                    grade: calculateGrade(),
                    studentAnswers: { ...ans, targetX: targetX },
                    pdfBase64: pdfBase64,
                    timestamp: new Date().toLocaleString('ar-IQ')
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                    setStep('success');
                } catch (e) {
                    alert("فشل الإرسال، يرجى التحقق من الرابط");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen py-8 px-4">
                    <div className="max-w-2xl mx-auto bg-white shadow-2xl rounded-[2rem] overflow-hidden border-t-[12px] border-blue-900 fade-in">
                        
                        {/* الشعار والجامعة */}
                        <div className="p-6 bg-white border-b flex justify-between items-center">
                            <div className="text-right">
                                <h1 className="text-2xl font-black text-blue-900">جامعة تكريت</h1>
                                <p className="text-xs font-bold text-slate-500">كلية الهندسة - قسم الهندسة المدنية</p>
                            </div>
                            <div className="text-blue-900 font-black border-2 border-blue-900 px-3 py-1 rounded-lg">التحليلات العددية</div>
                        </div>

                        {step === 'register' && (
                            <div className="p-10 text-right">
                                <h2 className="text-xl font-black mb-8 border-r-4 border-blue-600 pr-3">تسجيل الطالب</h2>
                                <input type="text" placeholder="الاسم الثلاثي باللغة العربية" className="w-full p-4 border-2 rounded-2xl mb-4 focus:border-blue-500 outline-none transition-all" onChange={e => setStudentInfo({...studentInfo, name: e.target.value})} />
                                <select className="w-full p-4 border-2 rounded-2xl mb-8 bg-slate-50" onChange={e => setStudentInfo({...studentInfo, studyType: e.target.value})}>
                                    <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>مسائي</option>
                                </select>
                                <button onClick={() => setStep('q1')} disabled={!studentInfo.name} className="w-full bg-blue-900 text-white font-black py-4 rounded-2xl shadow-xl disabled:opacity-30">دخول للواجب</button>
                            </div>
                        )}

                        {step === 'q1' && (
                            <div className="p-8 text-right">
                                <div className="bg-slate-50 p-5 rounded-2xl border-r-8 border-blue-900 mb-6 font-bold text-sm leading-relaxed">{hwData.q1.text}</div>
                                <table className="w-full text-center border-collapse mb-8 text-sm shadow-sm rounded-xl overflow-hidden">
                                    <tr className="bg-blue-900 text-white font-bold"><td>x</td>{hwData.q1.x.map(v => <td className="p-2 border border-blue-800">{v}</td>)}</tr>
                                    <tr className="bg-white"><td>y</td>{hwData.q1.y.map(v => <td className="p-2 border">{v}</td>)}</tr>
                                </table>
                                <div className="space-y-4">
                                    <input type="number" step="any" placeholder="Newton Forward Result" className="w-full p-3 border-2 rounded-xl text-center" onChange={e => setAns({...ans, q1f: e.target.value})} />
                                    <input type="number" step="any" placeholder="Newton Backward Result" className="w-full p-3 border-2 rounded-xl text-center" onChange={e => setAns({...ans, q1b: e.target.value})} />
                                    <input type="number" step="any" placeholder="Lagrange Result" className="w-full p-3 border-2 rounded-xl text-center" onChange={e => setAns({...ans, q1l: e.target.value})} />
                                </div>
                                <button onClick={() => setStep('q2')} className="w-full mt-8 bg-blue-900 text-white py-3 rounded-xl font-bold">السؤال التالي</button>
                            </div>
                        )}

                        {step === 'q2' && (
                            <div className="p-8 text-right">
                                <div className="bg-slate-50 p-5 rounded-2xl border-r-8 border-blue-900 mb-4 font-bold text-sm leading-relaxed">{hwData.q2.text}</div>
                                <img src="https://latex.codecogs.com/png.latex?\dpi{150}y=a_0+a_1x+a_2x^2" className="equation-img" alt="equation" />
                                <div className="grid grid-cols-3 gap-2 mb-8">
                                    <input type="number" placeholder="a0" className="p-3 border-2 rounded-xl text-center" onChange={e => setAns({...ans, q2a0: e.target.value})} />
                                    <input type="number" placeholder="a1" className="p-3 border-2 rounded-xl text-center" onChange={e => setAns({...ans, q2a1: e.target.value})} />
                                    <input type="number" placeholder="a2" className="p-3 border-2 rounded-xl text-center" onChange={e => setAns({...ans, q2a2: e.target.value})} />
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep('q1')} className="flex-1 bg-slate-200 py-3 rounded-xl">السابق</button>
                                    <button onClick={() => setStep('q3')} className="flex-[2] bg-blue-900 text-white py-3 rounded-xl font-bold">السؤال التالي</button>
                                </div>
                            </div>
                        )}

                        {step === 'q3' && (
                            <div className="p-8 text-right">
                                <div className="bg-slate-50 p-5 rounded-2xl border-r-8 border-blue-900 mb-4 font-bold text-sm leading-relaxed">{hwData.q3.text}</div>
                                <img src="https://latex.codecogs.com/png.latex?\dpi{150}y=a \cdot e^{bx}" className="equation-img" alt="equation" />
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <input type="number" placeholder="Constant a" className="p-3 border-2 rounded-xl text-center" onChange={e => setAns({...ans, q3a: e.target.value})} />
                                    <input type="number" placeholder="Constant b" className="p-3 border-2 rounded-xl text-center" onChange={e => setAns({...ans, q3b: e.target.value})} />
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep('q2')} className="flex-1 bg-slate-200 py-3 rounded-xl">السابق</button>
                                    <button onClick={() => setStep('submit')} className="flex-[2] bg-blue-900 text-white py-3 rounded-xl font-bold">الانتقال للرفع</button>
                                </div>
                            </div>
                        )}

                        {step === 'submit' && (
                            <div className="p-10 text-center">
                                <h3 className="text-xl font-black mb-6">رفع الحل اليدوي (PDF)</h3>
                                <div className="border-4 border-dashed p-10 rounded-3xl bg-slate-50 mb-8 border-blue-100">
                                    <input type="file" accept="application/pdf" onChange={handleFile} className="mb-4 block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
                                    <p className="text-xs text-slate-400 font-bold">ارفق ملف PDF واحد فقط بحد أقصى 8 ميجابايت</p>
                                </div>
                                <button onClick={submitAssignment} disabled={loading || !pdfBase64} className="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-xl disabled:opacity-30">
                                    {loading ? "جاري الإرسال..." : "تأكيد التسليم النهائي"}
                                </button>
                            </div>
                        )}

                        {step === 'success' && (
                            <div className="p-20 text-center animate-bounce">
                                <div className="text-7xl mb-6">🎓</div>
                                <h2 className="text-2xl font-black mb-4">تم التسليم بنجاح!</h2>
                                <p className="text-slate-500 font-bold">لقد قمت بتسليم بنجاح ستظهر اجاباتك عند الأستاذ.</p>
                                <p className="mt-6 text-blue-900 font-black italic">جامعة تكريت - قسم الهندسة المدنية</p>
                            </div>
                        )}
                    </div>
                    <p className="text-center text-slate-400 text-[10px] font-bold mt-8 italic">نظام إدارة الواجبات الذكي - مخصص لجامعة تكريت ٢٠٢٤</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
